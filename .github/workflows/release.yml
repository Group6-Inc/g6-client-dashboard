name: Release Plugin

on:
  push:
    tags:
      - 'v*'   # triggers on any version tag e.g. v0.1, v1.2.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release zip
        run: |
          mkdir -p build
          # Copy plugin files, excluding dev/repo files
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='build' \
                    --exclude='*.md' \
                    --exclude='plugin-manifest.json' \
                    . build/g6-client-dashboard/
          cd build
          zip -r g6-client-dashboard.zip g6-client-dashboard/

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: build/g6-client-dashboard.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
